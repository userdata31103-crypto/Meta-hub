<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>META HUB Active Plan</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:radial-gradient(circle at top,
#7b2cff,
#2b004f,
#12001f,
#000);
min-height:100vh;
padding:20px;
color:white;
animation:pageOpen .6s ease;
}

@keyframes pageOpen{
from{
opacity:0;
transform:translateY(30px);
}
to{
opacity:1;
transform:translateY(0);
}
}

.header{
text-align:center;
margin-bottom:25px;
}

.header h1{
font-size:35px;
text-shadow:
0 0 10px #c084fc,
0 0 20px #9333ea,
0 0 40px #9333ea;
}

.plan-card{
background:#111;
border-radius:25px;
padding:25px;
position:relative;
overflow:hidden;
box-shadow:
0 0 20px rgba(180,70,255,.4);
}

.plan-card::before{
content:"";
position:absolute;
width:200%;
height:200%;
top:-50%;
left:-50%;
background:conic-gradient(
transparent,
#c084fc,
transparent,
#9333ea,
transparent
);
animation:rotate 4s linear infinite;
}

.plan-card::after{
content:"";
position:absolute;
inset:3px;
background:#111;
border-radius:22px;
}

.plan-card *{
position:relative;
z-index:2;
}

@keyframes rotate{
100%{
transform:rotate(360deg);
}
}

.plan-row{
display:flex;
justify-content:space-between;
padding:15px 0;
border-bottom:1px solid rgba(255,255,255,.1);
}

.label{
color:#c084fc;
font-weight:bold;
}

.value{
font-weight:bold;
}

.status{
color:#00ff88;
}

.notice{
margin-top:20px;
background:#111;
padding:20px;
border-radius:20px;
box-shadow:
0 0 15px rgba(180,70,255,.4);
line-height:1.8;
}
.topbar{
background:#111;
padding:15px;
border-radius:20px;
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
box-shadow:0 0 20px rgba(180,70,255,.4);
}

.menu-btn{
background:linear-gradient(135deg,#9333ea,#c084fc);
border:none;
color:white;
padding:10px 18px;
border-radius:12px;
font-weight:bold;
cursor:pointer;
}

.logo{
font-size:22px;
font-weight:bold;
text-shadow:
0 0 10px #c084fc,
0 0 20px #9333ea;
}

</style>
</head>
<body>
  <div class="topbar">

<button class="menu-btn" onclick="history.back()">
⬅ Back
</button>

<div class="logo">
💜 META HUB
</div>

<button class="menu-btn" onclick="window.location.href='dashboard.html'">
🏠 Home
</button>

</div>

<div class="header">
<h1>🚀 META HUB Active Plan</h1>
</div>

<div class="plan-card">

<div class="plan-row">
<span class="label">Plan Name</span>
<span class="value">Starter Plan</span>
</div>

<div class="plan-row">
<span class="label">Investment</span>
<span class="value">0 PKR</span>
</div>

<div class="plan-row">
<span class="label">Daily Profit</span>
<span class="value">0 PKR</span>
</div>

<div class="plan-row">
<span class="label">Total Profit</span>
<span class="value">0 PKR</span>
</div>

<div class="plan-row">
<span class="label">Start Date</span>
<span class="value">--/--/----</span>
</div>

<div class="plan-row">
<span class="label">Status</span>
<span class="value status">Active</span>
</div>

</div>

<div class="notice">
📢 Deposit approve hone ke baad aapka plan yahan show hoga.
Firebase connect hone ke baad Plan Name, Profit aur Status automatically update honge.
</div>

</body>
</html>
