
<!DOCTYPE html>
<html>
<head>
  <link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#6a0dad">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>META HUB Login</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(-45deg,#000000,#2a0050,#5b00a5,#000000);
background-size:400% 400%;
animation:bgMove 10s ease infinite;
overflow:hidden;
}

@keyframes bgMove{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.container{
width:100%;
max-width:420px;
padding:20px;
}

/* META HUB LOGO */

.logo-container{
position:relative;
width:220px;
height:220px;
margin:0 auto 20px;
display:flex;
justify-content:center;
align-items:center;
}

.logo{
position:relative;
color:white;
font-size:34px;
font-weight:bold;
text-align:center;
text-shadow:
0 0 10px #fff,
0 0 20px #b84dff,
0 0 40px #b84dff,
0 0 80px #b84dff;
z-index:5;
animation:pulse 2s infinite;
}

@keyframes pulse{
50%{
transform:scale(1.08);
}
}

.ring{
position:absolute;
width:220px;
height:220px;
border-radius:50%;
border-top:5px solid white;
border-bottom:5px solid #b84dff;
border-left:5px solid transparent;
border-right:5px solid transparent;
animation:spin 3s linear infinite;
}

.ring2{
position:absolute;
width:180px;
height:180px;
border-radius:50%;
border-top:4px solid #b84dff;
border-bottom:4px solid white;
border-left:4px solid transparent;
border-right:4px solid transparent;
animation:spinReverse 2s linear infinite;
}

.ring3{
position:absolute;
width:140px;
height:140px;
border-radius:50%;
border-top:3px solid white;
border-bottom:3px solid #b84dff;
border-left:3px solid transparent;
border-right:3px solid transparent;
animation:spin 4s linear infinite;
}

@keyframes spin{
100%{
transform:rotate(360deg);
}
}

@keyframes spinReverse{
100%{
transform:rotate(-360deg);
}
}

/* LOGIN BOX */

.form-box{
background:#090909;
border:2px solid #b84dff;
border-radius:30px;
padding:30px;
box-shadow:
0 0 20px #b84dff,
0 0 50px rgba(184,77,255,.7);
animation:floatBox 4s ease-in-out infinite;
}

@keyframes floatBox{
0%,100%{
transform:translateY(0);
}
50%{
transform:translateY(-8px);
}
}

.form-box h1{
text-align:center;
font-size:40px;
color:#b84dff;
margin-bottom:25px;
}

/* INPUT */

input{
width:100%;
padding:15px;
margin:12px 0;
border:none;
outline:none;
border-radius:12px;
background:#222;
color:white;
font-size:16px;
transition:.3s;
}

input:focus{
box-shadow:
0 0 10px #b84dff,
0 0 20px #b84dff;
}

/* BUTTON */

button{
width:100%;
padding:15px;
margin-top:15px;
border:none;
border-radius:12px;
background:linear-gradient(90deg,#9333ea,#c084fc);
color:white;
font-size:20px;
font-weight:bold;
cursor:pointer;
animation:glow 2s infinite alternate;
}

@keyframes glow{
from{
box-shadow:0 0 10px #b84dff;
}
to{
box-shadow:0 0 30px #c084fc;
}
}

button:hover{
transform:scale(1.03);
}

/* TEXT */

p{
text-align:center;
margin-top:20px;
color:white;
font-size:18px;
}

a{
color:#c084fc;
text-decoration:none;
font-weight:bold;
}

a:hover{
text-shadow:0 0 10px #c084fc;
}

/* MOBILE */

@media(max-width:480px){

.logo-container{
width:180px;
height:180px;
}

.ring{
width:180px;
height:180px;
}

.ring2{
width:150px;
height:150px;
}

.ring3{
width:120px;
height:120px;
}

.logo{
font-size:28px;
}

.form-box h1{
font-size:32px;
}

}

  #installBtn{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
background:#6a0dad;
color:#fff;
border:none;
padding:12px 20px;
border-radius:10px;
font-size:16px;
cursor:pointer;
z-index:9999;
  }

</style>
  <link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#6a0dad">
<script src="main.js"></script>
</head>
  

<body>

<div class="container">

<div class="logo-container">
<div class="ring"></div>
<div class="ring2"></div>
<div class="ring3"></div>

<div class="logo">
META<br>HUB
</div>
</div>

<div class="form-box">

<h1>Login</h1>

<input type="email" id="email" placeholder="Enter Email">

<input type="password" id="password" placeholder="Enter Password">

<button onclick="login()">Login</button>

<p>
Don't have an account?
<a href="register.html">Register</a>
</p>

</div>

</div>
  <script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";

import {
getAuth,
signInWithEmailAndPassword
} from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";

const firebaseConfig = {
apiKey: "AIzaSyAwy6PKOBEti7MYOjHwe8WXV2yFAmLc9sI",
authDomain: "meta-hub-7fb4b.firebaseapp.com",
projectId: "meta-hub-7fb4b",
storageBucket: "meta-hub-7fb4b.firebasestorage.app",
messagingSenderId: "647396415736",
appId: "1:647396415736:web:35274b08bee5e283cd830d"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

window.login = async function(){

const email =
document.getElementById("email").value;

const password =
document.getElementById("password").value;

try{

await signInWithEmailAndPassword(
auth,
email,
password
);

alert("Login Successful");

window.location.href =
"dashboard.html";

}catch(error){

alert(error.message);

}

}

</script>
  <button id="installBtn" style="display:none;">
Install META HUB
</button>

<script src="main.js"></script>
  <script>
if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("./service-worker.js")
      .then(() => console.log("SW Registered"));
  });
}
  </script>

</body>
</html>
